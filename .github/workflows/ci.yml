name: CI

on:
  pull_request:
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        # Same major version as the Railway postgres-ssl:18 template
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: knives_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knives_ci
      PAYLOAD_SECRET: ci-only-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      # Exercises the full migration chain against a fresh database —
      # exactly what `npm start` runs on Railway before the app boots
      - name: Run database migrations
        run: npm run payload migrate

      - name: Build
        run: npm run build
